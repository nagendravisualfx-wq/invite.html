<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0d0d0d;
    --gold: #d4af37;
}

body {
    margin: 0;
    background: var(--bg);
    color: white;
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
}

/* DOORS */
#door-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
}

.door {
    width: 50%;
    height: 100%;
    background: black;
}

.trigger-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid gold;
    border-radius: 50%;
    padding: 25px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    opacity: 0;
}

h1 {
    font-size: 3rem;
    font-family: 'Playfair Display';
}

/* LIGHTS */
.light-string {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 50px;
    cursor: pointer;
}

.bulb {
    width: 15px;
    height: 20px;
    border-radius: 50%;
    background: #333;
}

.bulb.active {
    box-shadow: 0 0 20px currentColor;
}

/* GALLERY */
.polaroids {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.polaroid {
    background: white;
    padding: 10px;
    width: 150px;
    color: black;
}

.polaroid img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

/* DATE */
.flip-card {
    width: 200px;
    height: 250px;
    margin: 50px auto;
    perspective: 1000px;
    cursor: pointer;
}

.flip-inner {
    width: 100%;
    height: 100%;
    transition: 0.6s;
    transform-style: preserve-3d;
}

.flip-card.active .flip-inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid gold;
    backface-visibility: hidden;
}

.back {
    transform: rotateY(180deg);
    background: maroon;
}
</style>
</head>

<body>

<!-- DOOR -->
<div id="door-overlay">
    <div class="door" id="left-door"></div>
    <div class="trigger-btn" onclick="revealAll()">OPEN</div>
    <div class="door" id="right-door"></div>
</div>

<!-- HERO -->
<section class="hero" id="hero-sec">
    <div>
        <p>YOU ARE INVITED</p>
        <h1>Saikiran ❤️ Mounika</h1>
        <p>Join us for our special day</p>
    </div>
</section>

<!-- LIGHTS -->
<div class="light-string" onclick="toggleLights()">
    <div class="bulb" style="color:red"></div>
    <div class="bulb" style="color:yellow"></div>
    <div class="bulb" style="color:green"></div>
    <div class="bulb" style="color:blue"></div>
    <div class="bulb" style="color:pink"></div>
</div>

<!-- GALLERY -->
<div class="polaroids">
    <div class="polaroid">
        <img src="https://picsum.photos/200/300">
        <p>First Meet</p>
    </div>
    <div class="polaroid">
        <img src="https://picsum.photos/201/300">
        <p>Memories</p>
    </div>
</div>

<!-- DATE -->
<div class="flip-card" onclick="this.classList.toggle('active')">
    <div class="flip-inner">
        <div class="front">Tap</div>
        <div class="back">
            <div>
                <h2>AUG 20</h2>
                <p>2026</p>
            </div>
        </div>
    </div>
</div>

<script>

function revealAll() {
    gsap.to(".trigger-btn", { scale: 0, opacity: 0 });

    gsap.to("#left-door", {
        xPercent: -100,
        duration: 1.2
    });

    gsap.to("#right-door", {
        xPercent: 100,
        duration: 1.2,
        onComplete: () => {
            document.getElementById('door-overlay').style.display = 'none';
        }
    });

    gsap.to("#hero-sec", {
        opacity: 1,
        duration: 1,
        delay: 0.3
    });
}

/* LIGHT FIX */
let lightsOn = false;

function toggleLights() {
    const bulbs = document.querySelectorAll('.bulb');
    lightsOn = !lightsOn;

    bulbs.forEach((bulb, i) => {
        if (lightsOn) {
            gsap.to(bulb, {
                backgroundColor: bulb.style.color,
                delay: i * 0.1
            });
            bulb.classList.add("active");
        } else {
            gsap.to(bulb, {
                backgroundColor: "#333"
            });
            bulb.classList.remove("active");
        }
    });
}

</script>

</body>
</html>
